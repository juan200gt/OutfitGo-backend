services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel
    tty: true
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./home:/var/www/html
    command: sh -c "cd /var/www/html && php artisan serve --host=0.0.0.0 --port=8000"
    depends_on:
      - db

  nginx:
    image: nginx:stable-alpine
    container_name: laravel_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: laravel_db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: dwes
      MYSQL_PASSWORD: dwes
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: laravel_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: dwes
      PMA_PASSWORD: dwes
    depends_on:
      - db

volumes:
  db_data:
