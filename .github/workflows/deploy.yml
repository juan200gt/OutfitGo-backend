name: Deploy Backend to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.USER }}
          proxy_key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            # --- AMPLIACIÓN DE DISCO TEMPORAL ---
            echo "=== AMPLIANDO DISCO ==="
            df -h
            sudo growpart /dev/xvda 1 || true
            sudo resize2fs /dev/xvda1 || true
            sudo growpart /dev/nvme0n1 1 || true
            sudo resize2fs /dev/nvme0n1p1 || true
            df -h
            echo "======================="

            # Instalar Docker si no existe
            if ! command -v docker &> /dev/null; then
              echo "Instalando Docker..."
              curl -fsSL https://get.docker.com -o get-docker.sh
              sudo sh get-docker.sh
              sudo usermod -aG docker ubuntu
              sleep 10
            fi

            # Crear Swap de 2GB si no existe
            if [ ! -f /swapfile ]; then
              echo "Creando archivo Swap de 2GB..."
              sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi

            mkdir -p /home/ubuntu/backend
            cd /home/ubuntu/backend
            if [ ! -d ".git" ]; then
              git clone -b main https://github.com/${{ github.repository }}.git .
            else
              git pull origin main
            fi

            # Inyectar secretos en el .env del servidor host
            touch .env
            
            # --- INYECCIÓN DE LA LLAVE DE LA APP ---
            grep -q "^APP_KEY=" .env && sed -i "s|^APP_KEY=.*|APP_KEY=${{ secrets.APP_KEY }}|" .env || echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
            
            grep -q "^GOOGLE_CLIENT_ID=" .env && sed -i "s|^GOOGLE_CLIENT_ID=.*|GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}|" .env || echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            grep -q "^GOOGLE_CLIENT_SECRET=" .env && sed -i "s|^GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}|" .env || echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
            grep -q "^GOOGLE_REDIRECT_URI=" .env && sed -i "s|^GOOGLE_REDIRECT_URI=.*|GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}|" .env || echo "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}" >> .env
            
            grep -q "^STRIPE_SECRET=" .env && sed -i "s|^STRIPE_SECRET=.*|STRIPE_SECRET=${{ secrets.STRIPE_SECRET }}|" .env || echo "STRIPE_SECRET=${{ secrets.STRIPE_SECRET }}" >> .env
            grep -q "^MAIL_PASSWORD=" .env && sed -i "s|^MAIL_PASSWORD=.*|MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}|" .env || echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> .env
            grep -q "^GROQ_API_KEY=" .env && sed -i "s|^GROQ_API_KEY=.*|GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}|" .env || echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
            grep -q "^GEMINI_API_KEY=" .env && sed -i "s|^GEMINI_API_KEY=.*|GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}|" .env || echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env

            grep -q "^DB_HOST=" .env && sed -i "s|^DB_HOST=.*|DB_HOST=${{ secrets.RDS_HOST }}|" .env || echo "DB_HOST=${{ secrets.RDS_HOST }}" >> .env
            grep -q "^DB_DATABASE=" .env && sed -i "s|^DB_DATABASE=.*|DB_DATABASE=outfitgo|" .env || echo "DB_DATABASE=outfitgo" >> .env
            grep -q "^DB_USERNAME=" .env && sed -i "s|^DB_USERNAME=.*|DB_USERNAME=admin|" .env || echo "DB_USERNAME=admin" >> .env
            grep -q "^DB_PASSWORD=" .env && sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.RDS_PASSWORD }}|" .env || echo "DB_PASSWORD=${{ secrets.RDS_PASSWORD }}" >> .env

            # 1. Bajamos contenedores y limpiamos
            sudo docker compose -f docker-compose.prod.yml down --remove-orphans
            sudo docker system prune -af

            # 2. CREACIÓN DE CARPETAS FANTASMA PARA LARAVEL (Solución Error 1)
            mkdir -p storage/framework/cache/data
            mkdir -p storage/framework/views
            mkdir -p storage/framework/sessions
            mkdir -p storage/logs
            mkdir -p bootstrap/cache

            # 3. Instalación de librerías
            sudo docker compose -f docker-compose.prod.yml run --rm app composer install --optimize-autoloader

            # 4. Levantamos el sistema
            sudo docker compose -f docker-compose.prod.yml up -d --build
            
            # 5. INYECTAR EL .ENV DENTRO DEL CONTENEDOR (Solución Error 2)
            cat .env | sudo docker compose -f docker-compose.prod.yml exec -T app sh -c "cat > .env"

            # 6. Permisos y limpieza (¡Key generate eliminado por seguridad!)
            sudo chown -R ubuntu:www-data storage bootstrap/cache
            sudo chmod -R 775 storage bootstrap/cache
            sudo docker compose -f docker-compose.prod.yml exec -T app php artisan config:clear

            # 7. Base de datos: Migración
            sudo docker compose -f docker-compose.prod.yml exec -T app php artisan migrate --force
            
            # 8. Opcional: Sembrado de datos
            # sudo docker compose -f docker-compose.prod.yml exec -T app php artisan db:seed --force
