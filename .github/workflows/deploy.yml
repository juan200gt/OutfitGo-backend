name: Deploy Backend to AWS EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          proxy_host: ${{ secrets.BASTION_HOST }}
          proxy_username: ${{ secrets.USER }}
          proxy_key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            cd /home/ubuntu/backend
            git pull origin main

            # Inyectar secretos de Google en el .env del servidor
            touch home/.env
            grep -q "^GOOGLE_CLIENT_ID=" home/.env && sed -i "s|^GOOGLE_CLIENT_ID=.*|GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}|" home/.env || echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> home/.env
            grep -q "^GOOGLE_CLIENT_SECRET=" home/.env && sed -i "s|^GOOGLE_CLIENT_SECRET=.*|GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}|" home/.env || echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> home/.env
            grep -q "^GOOGLE_REDIRECT_URI=" home/.env && sed -i "s|^GOOGLE_REDIRECT_URI=.*|GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}|" home/.env || echo "GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}" >> home/.env
            # INYECTAR NUEVOS SECRETOS (Stripe, Correo e IAs)
            grep -q "^STRIPE_SECRET=" home/.env && sed -i "s|^STRIPE_SECRET=.*|STRIPE_SECRET=${{ secrets.STRIPE_SECRET }}|" home/.env || echo "STRIPE_SECRET=${{ secrets.STRIPE_SECRET }}" >> home/.env
            grep -q "^MAIL_PASSWORD=" home/.env && sed -i "s|^MAIL_PASSWORD=.*|MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}|" home/.env || echo "MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}" >> home/.env
            grep -q "^GROQ_API_KEY=" home/.env && sed -i "s|^GROQ_API_KEY=.*|GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}|" home/.env || echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> home/.env
            grep -q "^GEMINI_API_KEY=" home/.env && sed -i "s|^GEMINI_API_KEY=.*|GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}|" home/.env || echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> home/.env

            # INYECTAR CONEXIÓN RDS
            grep -q "^DB_HOST=" home/.env && sed -i "s|^DB_HOST=.*|DB_HOST=${{ secrets.RDS_HOST }}|" home/.env || echo "DB_HOST=${{ secrets.RDS_HOST }}" >> home/.env
            grep -q "^DB_DATABASE=" home/.env && sed -i "s|^DB_DATABASE=.*|DB_DATABASE=laravel|" home/.env || echo "DB_DATABASE=laravel" >> home/.env
            grep -q "^DB_USERNAME=" home/.env && sed -i "s|^DB_USERNAME=.*|DB_USERNAME=admin|" home/.env || echo "DB_USERNAME=admin" >> home/.env
            grep -q "^DB_PASSWORD=" home/.env && sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.RDS_PASSWORD }}|" home/.env || echo "DB_PASSWORD=${{ secrets.RDS_PASSWORD }}" >> home/.env

            # 1. Bajamos contenedores anteriores
            sudo docker compose down --remove-orphans

            # 2. Instalación de librerías ANTES de levantar el servicio principal
            # Usamos 'run --rm' para crear un contenedor temporal que instale todo
            sudo docker compose run --rm app composer install --optimize-autoloader

            # 3. Levantamos el sistema completo
            sudo docker compose up -d --build
            
            # 4. Arreglo de permisos y Limpieza de caché
            sudo chown -R ubuntu:www-data home/storage home/bootstrap/cache
            sudo chmod -R 775 home/storage home/bootstrap/cache
            sudo docker compose exec -T app php artisan config:clear
            sudo docker compose exec -T app php artisan key:generate --force

            # 5. Base de datos: Migración
            sudo docker compose exec -T app php artisan migrate --force
            
            # 7. Opcional: Sembrado de datos (Descomentar para poblar la DB automáticamente en cada despliegue)
            # sudo docker compose exec -T app php artisan db:seed --force
